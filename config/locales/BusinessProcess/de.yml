    make_current:
      Success:                                "Geschäftsprozess ausgewählt"
      Failure:                                "Geschäftsprozess kann nicht ausgewählt werden"
    new_version:
      Success:                                "Neue Version wurde erstellt"
      Failure:                                "Eine neue Version kann nicht erstellt werden"
    finalize:
      Success:                                "Geschäftsprozess fertiggestellt"
      Failure:                                "Der Scheduled Flow kann nicht finalisiert werden"
