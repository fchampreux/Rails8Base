      UpdatedAt:                              "Aktualisiert am"
    show:
      Manage:                                 "Geschäftsprozess verwalten"
      # Field names
      Code:                                   "Kennung"
      Name:                                   "Name"
      Description:                            "Beschreibung"
      Participants:                           "Beteiligte Organisationen"      
    new:
      New:                                    "Neuer Geschäftsprozess"
      # Field names
      Code:                                   "Kennung"
      Name:                                   "Name"
      Description:                            "Beschreibung"
      Participants:                           "Beteiligte Organisationen"    
    edit:
      Edit:                                   "Geschäftsprozess bearbeiten"
