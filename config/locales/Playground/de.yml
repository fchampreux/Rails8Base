# Code for language as declared in i18n configuration
de:
  # Considered object from a global view
  Playgrounds:                              "Entitäten"
  Playground:                               "Entität"
  ManagingPlaygrounds:                      "Entitäten verwalten"
  NewPlayground:                            "Neue Entität"
  PlaygroundRejected:                       "Entität wurde abgelehnt"
  # Considered object from controller's methods. In the controller, the relative path for the term is marked by the point (.)
  # Use generic terms, excluding objec name (ie Manage instead of ManageBusinessFlow )
  playgrounds:
    index:
      # Columns titles
      Code:                                   "Kennung"
      Name:                                   "Name"
      Description:                            "Beschreibung"
      Owner:                                  "Eigentümer"
      UpdatedBy:                              "Aktualisiert von"
      UpdatedAt:                              "Aktualisiert am"
      # Button
      Select:                                 "Auswählen"
    show:
      Manage:                                 "Entitäten verwalten"
      # Field names
      Code:                                   "Kennung"
      Name:                                   "Name"
      Description:                            "Beschreibung"
    new:
      New:                                    "Neuer Entität"
      # Field names
      Code:                                   "Kennung"
      Name:                                   "Name"
      Description:                            "Beschreibung"
    edit:
      Edit:                                   "Entität bearbeiten"
      # Field names
      Code:                                   "Kennung"
      Name:                                   "Name"
      Description:                            "Beschreibung"
    create:
      Success:                             	  "erfolgreich erstellt Entität"
      Failure:                                "Entität konnte nicht erstellt werden"
    update:
      Success:                             	  "erfolgreich aktualisierter Entität"
      Failure:                                "Entität konnte nicht aktualisierter werden"
    activate:
      Success:                             	  "Entität erfolgreich wiederhergestellt"
      Failure:                                "Entität konnte nicht abgerufen werden"
    destroy:
      Success:                             	  "Scheduled flow erfolgreich gelöscht"
      Failure:                                "Scheduled flow konnte nicht gelöscht werden"
    make_current:
      Success:                                "Scheduled flow ausgewählt"
      Failure:                                "Scheduled flow kann nicht ausgewählt werden"
    new_version:
      Success:                                "Neue Version wurde erstellt"
      Failure:                                "Eine neue Version kann nicht erstellt werden"
    finalize:
      Success:                                "Scheduled flow fertiggestellt"
      Failure:                                "Der Scheduled Flow kann nicht finalisiert werden"
